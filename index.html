<!DOCTYPE html>
<html>
<head>
    <title>Clock</title>
</head>
<body>

<h1>Current Time</h1>

<button onclick="showTime()">
    Click Me
</button>

<p id="time"></p>

<script>
function showTime() {
    let now = new Date();
    document.getElementById("time").innerHTML =
        now.toLocaleTimeString();
}
</script>

</body>
</html>
